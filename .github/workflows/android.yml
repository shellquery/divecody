name: Build Android AAB (Google Play)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: ''

jobs:
  build-aab:
    name: Build signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Compute version code
        id: version
        run: |
          # version_code = total git commits (auto-increments with every push)
          VERSION_CODE=$(git rev-list --count HEAD)
          # version_name from input or package.json
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(node -p "require('./package.json').version")
          fi
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Patch versionCode and versionName in build.gradle
        run: |
          GRADLE=android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.code }}/" $GRADLE
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.name }}\"/" $GRADLE
          grep -E 'versionCode|versionName' $GRADLE

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            echo "Keystore decoded"
          else
            echo "No keystore secret — building unsigned debug AAB"
          fi

      - name: Build signed AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f app/release.jks ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.jks \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew bundleDebug
          fi

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find android -name "*.aab" | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT
          echo "AAB: $AAB ($(du -h $AAB | cut -f1))"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: divecody-aab-${{ steps.version.outputs.name }}-${{ github.sha }}
          path: ${{ steps.aab.outputs.path }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Android AAB Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.shellquery.divecody |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | \`${{ steps.aab.outputs.path }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Upload to Google Play" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the **.aab** from Artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to [Google Play Console](https://play.google.com/console)" >> $GITHUB_STEP_SUMMARY
          echo "3. Create app → Internal testing → Upload the AAB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### First-time setup" >> $GITHUB_STEP_SUMMARY
          echo "Add these repository secrets for signing:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEYSTORE_BASE64\` — \`base64 -i release.jks\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEYSTORE_PASSWORD\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEY_ALIAS\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEY_PASSWORD\`" >> $GITHUB_STEP_SUMMARY
