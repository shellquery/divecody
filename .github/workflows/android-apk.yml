name: Build Android APK (sideload)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android -name "*.apk" | head -1)
          SIZE=$(du -h "$APK" | cut -f1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "size=$SIZE"   >> $GITHUB_OUTPUT
          echo "APK: $APK ($SIZE)"

      - name: Rename APK
        run: |
          cp "${{ steps.apk.outputs.path }}" divecody-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: divecody-apk-${{ github.sha }}
          path: divecody-debug.apk
          retention-days: 14

      - name: Summary
        run: |
          echo "## ✅ APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.apk.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on your phone" >> $GITHUB_STEP_SUMMARY
          echo "1. Download **divecody-debug.apk** from Artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "2. Transfer to your phone (AirDrop, cable, Google Drive, WeChat…)" >> $GITHUB_STEP_SUMMARY
          echo "3. On Android: **Settings → Security → Install unknown apps** → allow your file manager" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap the APK file to install" >> $GITHUB_STEP_SUMMARY
