<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 550">
<defs>
  <!-- Hatching patterns for engraving texture -->
  <pattern id="h1" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="3" stroke="#555" stroke-width="0.5" opacity="0.6"/>
  </pattern>
  <pattern id="h2" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
    <line x1="0" y1="0" x2="0" y2="4" stroke="#444" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <pattern id="h3" width="2.5" height="2.5" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
    <line x1="0" y1="0" x2="0" y2="2.5" stroke="#333" stroke-width="0.6" opacity="0.7"/>
  </pattern>
  <pattern id="fine" width="2" height="2" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
    <line x1="0" y1="0" x2="0" y2="2" stroke="#222" stroke-width="0.4" opacity="0.8"/>
  </pattern>
  <!-- Glow filter -->
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="soften" x="-5%" y="-5%" width="110%" height="110%">
    <feGaussianBlur stdDeviation="0.8"/>
  </filter>
  <!-- Sky gradient: deep dark top, hellish amber glow below -->
  <radialGradient id="skyGrad" cx="50%" cy="35%" r="60%">
    <stop offset="0%"  stop-color="#c8a040" stop-opacity="0.18"/>
    <stop offset="40%" stop-color="#2a1a08" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0a0604" stop-opacity="1"/>
  </radialGradient>
  <!-- Ground fire glow -->
  <radialGradient id="fireGrad" cx="50%" cy="80%" r="50%">
    <stop offset="0%"  stop-color="#d06010" stop-opacity="0.5"/>
    <stop offset="50%" stop-color="#701808" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0a0604" stop-opacity="0"/>
  </radialGradient>
  <!-- Figure gradient (lit from below) -->
  <linearGradient id="figLit" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#c89050" stop-opacity="0.9"/>
    <stop offset="40%" stop-color="#806030" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#181008" stop-opacity="0.95"/>
  </linearGradient>
  <linearGradient id="rockGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4a3820"/>
    <stop offset="100%" stop-color="#1a0e06"/>
  </linearGradient>
  <clipPath id="scene">
    <rect width="350" height="550"/>
  </clipPath>
</defs>

<g clip-path="url(#scene)">

<!-- ── BASE: deep black background ── -->
<rect width="350" height="550" fill="#0a0604"/>

<!-- ── SKY hatching layers (upper half atmosphere) ── -->
<rect width="350" height="300" fill="url(#h2)" opacity="0.4"/>
<rect width="350" height="220" fill="url(#h1)" opacity="0.3"/>

<!-- ── Atmospheric sky gradient ── -->
<rect width="350" height="550" fill="url(#skyGrad)"/>

<!-- ── Streaks of dark cloud / smoke in upper sky ── -->
<ellipse cx="80"  cy="60"  rx="120" ry="22" fill="#0d0a06" opacity="0.7"/>
<ellipse cx="260" cy="90"  rx="100" ry="18" fill="#0d0a06" opacity="0.6"/>
<ellipse cx="160" cy="40"  rx="90"  ry="14" fill="#0a0804" opacity="0.8"/>
<ellipse cx="300" cy="55"  rx="80"  ry="16" fill="#0c0906" opacity="0.65"/>
<!-- Wispy smoke tendrils -->
<path d="M 20 80 Q 60 60 90 75 Q 130 90 160 72 Q 200 55 240 70" fill="none" stroke="#1a1208" stroke-width="8" opacity="0.5" filter="url(#soften)"/>
<path d="M 100 110 Q 150 95 200 108 Q 250 120 310 100" fill="none" stroke="#1a1208" stroke-width="6" opacity="0.4" filter="url(#soften)"/>

<!-- ── DISTANT CHASM WALLS (background) ── -->
<path d="M 0 280 Q 30 260 60 270 Q 90 255 120 268 Q 150 250 175 265 L 175 550 L 0 550 Z" fill="#1a0e06" opacity="0.95"/>
<rect x="0" y="280" width="175" height="30" fill="url(#h3)" opacity="0.5"/>
<path d="M 175 265 Q 210 248 240 260 Q 270 248 300 258 Q 325 245 350 255 L 350 550 L 175 550 Z" fill="#150b04" opacity="0.95"/>
<rect x="175" y="265" width="175" height="30" fill="url(#fine)" opacity="0.5"/>

<!-- ── BURNING SAND PLAIN (mid-ground) ── -->
<!-- The plain of hot sand where rain of fire falls -->
<ellipse cx="175" cy="380" rx="190" ry="55" fill="#1e1208" opacity="0.9"/>
<ellipse cx="175" cy="380" rx="175" ry="45" fill="#251608" opacity="0.8"/>
<rect x="0" y="340" width="350" height="100" fill="url(#h1)" opacity="0.25"/>
<!-- Texture of sand -->
<ellipse cx="120" cy="390" rx="60"  ry="12" fill="#1a0e06" opacity="0.6"/>
<ellipse cx="240" cy="395" rx="55"  ry="10" fill="#180c06" opacity="0.6"/>
<ellipse cx="175" cy="400" rx="80"  ry="14" fill="#1c1006" opacity="0.5"/>
<!-- Ground fire glow radiating upward -->
<rect width="350" height="550" fill="url(#fireGrad)"/>

<!-- Falling sparks / fire rain (dots and streaks) -->
<g opacity="0.45" filter="url(#soften)">
  <line x1="45"  y1="150" x2="38"  y2="175" stroke="#d08020" stroke-width="1.2"/>
  <line x1="80"  y1="130" x2="74"  y2="158" stroke="#c07010" stroke-width="1"/>
  <line x1="130" y1="160" x2="124" y2="185" stroke="#d08020" stroke-width="1.2"/>
  <line x1="175" y1="140" x2="169" y2="168" stroke="#c87818" stroke-width="1"/>
  <line x1="220" y1="155" x2="215" y2="180" stroke="#d08020" stroke-width="1.3"/>
  <line x1="265" y1="135" x2="259" y2="162" stroke="#c07010" stroke-width="1"/>
  <line x1="305" y1="160" x2="299" y2="188" stroke="#d08020" stroke-width="1.2"/>
  <line x1="60"  y1="200" x2="55"  y2="222" stroke="#b86010" stroke-width="0.9"/>
  <line x1="105" y1="210" x2="100" y2="232" stroke="#c07010" stroke-width="1"/>
  <line x1="155" y1="195" x2="150" y2="218" stroke="#d08020" stroke-width="1"/>
  <line x1="200" y1="205" x2="195" y2="228" stroke="#c07010" stroke-width="1"/>
  <line x1="245" y1="198" x2="240" y2="220" stroke="#b86010" stroke-width="0.9"/>
  <line x1="290" y1="210" x2="285" y2="232" stroke="#c07010" stroke-width="1"/>
  <circle cx="45"  cy="175" r="1.2" fill="#e09030" opacity="0.8"/>
  <circle cx="80"  cy="158" r="1"   fill="#d08020" opacity="0.7"/>
  <circle cx="130" cy="185" r="1.3" fill="#e09030" opacity="0.8"/>
  <circle cx="175" cy="168" r="1.1" fill="#d08020" opacity="0.7"/>
  <circle cx="220" cy="180" r="1.2" fill="#e09030" opacity="0.8"/>
  <circle cx="265" cy="162" r="1"   fill="#d08020" opacity="0.7"/>
  <circle cx="305" cy="188" r="1.2" fill="#e09030" opacity="0.8"/>
</g>

<!-- ── THREE FLORENTINE SOULS running in a ring ── -->
<!-- They run in a circle, holding each other's shoulders,
     calling up to Dante on the bank. Lit from below by the fire. -->

<!-- Figure 1 (left, facing right-ish) -->
<g transform="translate(95, 310)" opacity="0.95">
  <!-- shadow on ground -->
  <ellipse cx="12" cy="72" rx="20" ry="5" fill="#0a0604" opacity="0.7"/>
  <!-- legs (running pose) -->
  <line x1="8"  y1="55" x2="-8"  y2="72" stroke="#2a1808" stroke-width="6" stroke-linecap="round"/>
  <line x1="8"  y1="55" x2="22"  y2="70" stroke="#3a2010" stroke-width="6" stroke-linecap="round"/>
  <!-- torso -->
  <rect x="0" y="22" width="16" height="34" rx="4" fill="#2a1808"/>
  <rect x="0" y="22" width="16" height="34" rx="4" fill="url(#figLit)" opacity="0.6"/>
  <!-- arm reaching forward -->
  <line x1="16" y1="30" x2="38"  y2="22" stroke="#3a2010" stroke-width="5" stroke-linecap="round"/>
  <!-- arm reaching back -->
  <line x1="0"  y1="30" x2="-14" y2="35" stroke="#2a1808" stroke-width="5" stroke-linecap="round"/>
  <!-- head -->
  <ellipse cx="9" cy="14" rx="11" ry="13" fill="#3a2010"/>
  <ellipse cx="9" cy="14" rx="11" ry="13" fill="url(#figLit)" opacity="0.5"/>
  <!-- face detail (facing slightly up toward Dante) -->
  <ellipse cx="11" cy="12" rx="5" ry="4" fill="#4a2a14" opacity="0.6"/>
  <!-- hatching on body for depth -->
  <rect x="0" y="22" width="16" height="34" rx="4" fill="url(#h2)" opacity="0.3"/>
</g>

<!-- Figure 2 (center, facing away / upward toward Dante) -->
<g transform="translate(160, 300)" opacity="0.95">
  <ellipse cx="10" cy="78" rx="18" ry="5" fill="#0a0604" opacity="0.7"/>
  <!-- legs (mid-stride) -->
  <line x1="6"  y1="60" x2="-5"  y2="78" stroke="#2a1808" stroke-width="6" stroke-linecap="round"/>
  <line x1="6"  y1="60" x2="18"  y2="76" stroke="#3a2010" stroke-width="6" stroke-linecap="round"/>
  <!-- torso (slightly turned) -->
  <rect x="-1" y="24" width="17" height="37" rx="4" fill="#2a1808"/>
  <rect x="-1" y="24" width="17" height="37" rx="4" fill="url(#figLit)" opacity="0.7"/>
  <!-- arms reaching upward to address Dante -->
  <line x1="15" y1="30" x2="30"  y2="15" stroke="#3a2010" stroke-width="5" stroke-linecap="round"/>
  <line x1="-1" y1="30" x2="-16" y2="18" stroke="#2a1808" stroke-width="5" stroke-linecap="round"/>
  <!-- hand gesturing upward -->
  <circle cx="30" cy="14" r="4" fill="#3a2010"/>
  <!-- head looking upward -->
  <ellipse cx="7" cy="14" rx="12" ry="13" fill="#3a2010"/>
  <ellipse cx="7" cy="14" rx="12" ry="13" fill="url(#figLit)" opacity="0.65"/>
  <!-- face lit from below, looking up -->
  <ellipse cx="10" cy="10" rx="6" ry="5" fill="#5a3418" opacity="0.7"/>
  <rect x="-1" y="24" width="17" height="37" rx="4" fill="url(#h1)" opacity="0.25"/>
</g>

<!-- Figure 3 (right, facing left, completing the ring) -->
<g transform="translate(228, 315)" opacity="0.95">
  <ellipse cx="8" cy="70" rx="18" ry="5" fill="#0a0604" opacity="0.7"/>
  <!-- legs -->
  <line x1="10" y1="52" x2="22"  y2="70" stroke="#2a1808" stroke-width="6" stroke-linecap="round"/>
  <line x1="10" y1="52" x2="-4"  y2="68" stroke="#3a2010" stroke-width="6" stroke-linecap="round"/>
  <!-- torso -->
  <rect x="2"  y="20" width="15" height="33" rx="4" fill="#2a1808"/>
  <rect x="2"  y="20" width="15" height="33" rx="4" fill="url(#figLit)" opacity="0.55"/>
  <!-- arms -->
  <line x1="2"  y1="28" x2="-18" y2="22" stroke="#2a1808" stroke-width="5" stroke-linecap="round"/>
  <line x1="17" y1="28" x2="32"  y2="32" stroke="#3a2010" stroke-width="5" stroke-linecap="round"/>
  <!-- head (facing left) -->
  <ellipse cx="8" cy="12" rx="11" ry="13" fill="#382010"/>
  <ellipse cx="8" cy="12" rx="11" ry="13" fill="url(#figLit)" opacity="0.5"/>
  <ellipse cx="5" cy="10" rx="5" ry="4" fill="#4a2814" opacity="0.55"/>
  <rect x="2"  y="20" width="15" height="33" rx="4" fill="url(#h2)" opacity="0.2"/>
</g>

<!-- ── ROCKY BANK (foreground) where Dante & Virgil stand ── -->
<!-- The bank they stand on rises in the foreground -->
<path d="M -10 480 Q 40 450 90 465 Q 140 445 175 460 Q 220 440 270 455 Q 310 438 360 450 L 360 560 L -10 560 Z" fill="#1e1408" opacity="1"/>
<path d="M -10 480 Q 40 450 90 465 Q 140 445 175 460 Q 220 440 270 455 Q 310 438 360 450 L 360 560 L -10 560 Z" fill="url(#h3)" opacity="0.4"/>
<!-- Rock texture details -->
<path d="M 0 465 Q 35 455 65 465 Q 80 460 100 470" fill="none" stroke="#2a1808" stroke-width="2" opacity="0.6"/>
<path d="M 150 450 Q 190 442 225 452 Q 255 445 280 455" fill="none" stroke="#2a1808" stroke-width="2" opacity="0.5"/>
<!-- Shadow under bank overhang -->
<path d="M -10 475 Q 90 462 175 458 Q 270 452 360 448 L 360 455 Q 270 460 175 465 Q 90 470 -10 483 Z" fill="#0a0604" opacity="0.8"/>
<!-- Fine hatching on rock face -->
<rect x="0" y="455" width="350" height="105" fill="url(#fine)" opacity="0.3"/>

<!-- ── DANTE AND VIRGIL silhouettes on the bank ── -->
<!-- Virgil (left, taller, guide — gesturing toward the souls below) -->
<g transform="translate(88, 390)">
  <!-- cloak / robe -->
  <path d="M -12 0 Q -18 30 -20 90 Q -10 95 0 90 Q 10 95 18 90 Q 16 30 10 0 Z" fill="#141008" opacity="0.95"/>
  <path d="M -12 0 Q -18 30 -20 90 Q -10 95 0 90 Q 10 95 18 90 Q 16 30 10 0 Z" fill="url(#h1)" opacity="0.35"/>
  <!-- arm outstretched toward souls -->
  <line x1="10" y1="25" x2="42" y2="38" stroke="#141008" stroke-width="7" stroke-linecap="round"/>
  <line x1="10" y1="25" x2="42" y2="38" stroke="url(#figLit)" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- other arm holding staff -->
  <line x1="-10" y1="25" x2="-22" y2="75" stroke="#0e0c08" stroke-width="5" stroke-linecap="round"/>
  <!-- head with laurel -->
  <ellipse cx="0" cy="-12" rx="13" ry="15" fill="#1a1208"/>
  <ellipse cx="0" cy="-12" rx="13" ry="15" fill="url(#figLit)" opacity="0.25"/>
  <!-- laurel wreath hint -->
  <path d="M -13 -16 Q -8 -28 0 -26 Q 8 -28 13 -16" fill="none" stroke="#303818" stroke-width="2.5" opacity="0.7"/>
</g>

<!-- Dante (right of Virgil, slightly behind, gazing down at souls) -->
<g transform="translate(145, 398)">
  <!-- robe -->
  <path d="M -10 0 Q -14 28 -15 85 Q -5 90 4 85 Q 13 90 15 85 Q 14 28 8 0 Z" fill="#161008" opacity="0.9"/>
  <path d="M -10 0 Q -14 28 -15 85 Q -5 90 4 85 Q 13 90 15 85 Q 14 28 8 0 Z" fill="url(#h2)" opacity="0.3"/>
  <!-- arm leaning on the ledge -->
  <line x1="-8" y1="28" x2="-28" y2="40" stroke="#141008" stroke-width="6" stroke-linecap="round"/>
  <!-- head bowed forward watching the souls -->
  <ellipse cx="2" cy="-10" rx="12" ry="13" fill="#181208"/>
  <ellipse cx="2" cy="-10" rx="12" ry="13" fill="url(#figLit)" opacity="0.2"/>
</g>

<!-- ── FOREGROUND shadow / depth layer ── -->
<rect x="0" y="490" width="350" height="60" fill="#0a0604" opacity="0.85"/>
<rect x="0" y="490" width="350" height="60" fill="url(#fine)" opacity="0.5"/>

<!-- ── Overall atmospheric vignette ── -->
<radialGradient id="vignette" cx="50%" cy="50%" r="70%">
  <stop offset="0%" stop-color="#000" stop-opacity="0"/>
  <stop offset="70%" stop-color="#000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0.75"/>
</radialGradient>
<rect width="350" height="550" fill="url(#vignette)"/>

<!-- ── Caption area at bottom (like a Doré plate) ── -->
<rect x="0" y="520" width="350" height="30" fill="#0a0604" opacity="0.9"/>
<line x1="30" y1="522" x2="320" y2="522" stroke="#3a2808" stroke-width="0.5" opacity="0.6"/>
<text x="175" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#6a4820" opacity="0.75" letter-spacing="1.5">INFERNO · CANTO XVI</text>

</g>
</svg>
